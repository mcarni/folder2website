  event-title: Scopriamo il Castello di Brescia percorrendo la strada del soccorso
  event-header1: ''
  event-header2: Sabato 07/03
  event-header3: ore 14:45
  event-header4: ''
  event-text: Per chi si reca spesso in castello ma vorrebbe conoscere meglio la sua storia e la sua evoluzione e scoprire quella maledetta strada del Soccorso che per ben 2 volte ha portato i bresciani al massacro. Ricorrono in questi giorni le X Giornate di Brescia (23 marzo, 1 aprile 1849). 
